<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Invest - Simulation Trading Futuriste</title>
    <!-- Chart.js pour les graphiques interactifs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-space: #050614;
            --bg-panel: #0c0e24;
            --bg-panel-light: #16193b;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --text-main: #f0f2fa;
            --text-muted: #6e759f;
            --border-glow: #1f244d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-space);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* BARRE DE NAVIGATION SUPÉRIEURE */
        header {
            background-color: var(--bg-panel);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-glow);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-btn div {
            width: 22px;
            height: 2px;
            background-color: var(--neon-cyan);
            box-shadow: 0 0 5px var(--neon-cyan);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ZONE EN HAUT À DROITE */
        .stock-selector-container {
            position: relative;
        }

        .stock-select-btn {
            background: var(--bg-panel-light);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .stock-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 200;
            max-height: 250px;
            overflow-y: auto;
        }

        .stock-dropdown div {
            padding: 12px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(31, 36, 77, 0.3);
            text-align: left;
        }

        .stock-dropdown div:hover {
            background: var(--bg-panel-light);
            color: var(--neon-cyan);
        }

        .wallet-pill {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid var(--neon-green);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--neon-green);
        }

        /* MENU DES 3 BARRES (MENU TIROIR COULISSANT) */
        .sidebar-drawer {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-glow);
            box-shadow: 10px 0 40px rgba(0,0,0,0.5);
            z-index: 500;
            transition: left 0.3s ease;
            padding-top: 80px;
            box-sizing: border-box;
        }

        .sidebar-drawer.open {
            left: 0;
        }

        .drawer-menu-item {
            padding: 16px 28px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-main);
            border-left: 3px solid transparent;
            text-align: left;
        }

        .drawer-menu-item:hover {
            background: var(--bg-panel-light);
            color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
        }

        /* LAYOUT CENTRAL PRINCIPAL */
        .main-layout {
            display: flex;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        /* ÉCRAN DE BIENVENUE PAR DÉFAUT */
        .welcome-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-space);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .welcome-title span {
            color: var(--neon-cyan);
            font-weight: 800;
        }

        /* CONTENU DE L'ESPACE DE MARCHÉ RESPONSIVE MOBILE */
        .content-panel {
            width: 100%;
            height: 100%;
            display: none;
            grid-template-columns: 320px 1fr;
        }

        .content-panel.active {
            display: grid;
        }

        /* LISTE DES ACTIFS GAUCHE (S'ADAPTE SUR MOBILE) */
        .assets-sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-heading {
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-glow);
            margin: 0;
            text-align: left;
        }

        .asset-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(31, 36, 77, 0.3);
            cursor: pointer;
        }

        .up { color: var(--neon-green); }
        .down { color: var(--neon-red); }

        /* ESPACE TRAVAIL CHART & SIMULATION DÉMO */
        .trading-workspace {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-space);
            width: 100%;
        }

        .workspace-header {
            padding: 12px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-frame {
            flex-grow: 1;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            min-height: 220px;
        }

        /* ACTIONS D'INVESTISSEMENT DE DÉMONSTRATION */
        .demo-invest-bar {
            background: var(--bg-panel);
            border-top: 1px solid var(--border-glow);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .invest-input-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
            width: 100%;
        }

        .invest-input-box label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .invest-input-box input {
            background: var(--bg-panel-light);
            border: 1px solid var(--border-glow);
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-family: monospace;
            font-size: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        .action-btn.buy { background: var(--neon-green); color: var(--bg-space); }
        .action-btn.sell { background: var(--neon-red); color: white; }

        /* MODALE DU FLUX D'ACTION */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 4, 12, 0.9);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .choice-modal {
            background: var(--bg-panel);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 12px;
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .modal-btn.primary { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; }
        .modal-btn.secondary { background: var(--bg-panel-light); color: var(--neon-green); border-color: var(--neon-green); }
        .modal-btn.cancel { background: transparent; color: var(--text-muted); }

        /* WALLET */
        .wallet-view-pane {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .wallet-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            padding: 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-purple);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            display: none;
            z-index: 2000;
            white-space: nowrap;
        }

        .backdrop-close {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 400;
            display: none;
        }

        /* 📱 REGLES SÉCIALES POUR LES SMARTPHONES (IPHONE) */
        @media (max-width: 768px) {
            .content-panel.active {
                grid-template-columns: 1fr; /* On vire les deux colonnes côte à côte */
            }
            
            /* Cache la liste de gauche pour laisser la place au graphique */
            .assets-sidebar {
                display: none; 
            }
            
            /* Quand on force l'affichage de la liste */
            .assets-sidebar.mobile-show {
                display: flex;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 80;
            }

            .demo-invest-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="backdrop-close" id="menuBackdrop" onclick="toggleMenu(false)"></div>

    <!-- HEADER DE NAVIGATION -->
    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu(true)">
                <div></div><div></div><div></div>
            </button>
            <div class="logo-container" onclick="resetToWelcome()">
                <div class="brand-name">Orbit Invest</div>
            </div>
        </div>

        <div class="header-right">
            <!-- TOUTES LES ENTREPRISES DE LA BOURSE EN HAUT À DROITE -->
            <div class="stock-selector-container">
                <button class="stock-select-btn" onclick="toggleStockDropdown(event)">Bourse ▾</button>
                <div class="stock-dropdown" id="stockDropdown"></div>
            </div>
            <div class="wallet-pill" id="headerBalance">10 000.00 $</div>
        </div>
    </header>

    <!-- LES 3 BARRES : MENU LATÉRAL -->
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="drawer-menu-item" onclick="navigateTo('stock')">📈 Entreprises Bourse</div>
        <div class="drawer-menu-item" onclick="navigateTo('crypto')">🪙 Crypto-monnaies</div>
        <div class="drawer-menu-item" onclick="navigateTo('meme')">🚀 Meme Coins</div>
        <div class="drawer-menu-item" onclick="navigateTo('wallet')">💼 Mon Wallet Démo</div>
    </div>

    <div class="main-layout">
        
        <!-- ÉCRAN MARQUÉ BIENVENUE -->
        <div class="welcome-view" id="welcomeScreen">
            <h1 class="welcome-title">Bienvenue sur <span>Orbit Invest</span></h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Simulation trading sur smartphone en direct.</p>
            <button class="stock-select-btn" style="padding: 14px 30px;" onclick="navigateTo('stock')">Entrer sur le site</button>
        </div>

        <!-- ZONE DE RENDU INTERACTIVE -->
        <div class="content-panel" id="marketWorkspace">
            
            <!-- LISTE REPLIABLE SUR MOBILE -->
            <div class="assets-sidebar" id="mobileAssetsSidebar">
                <h3 class="panel-heading" id="sidebarCategoryTitle">Actifs</h3>
                <ul class="asset-list" id="assetsContainer"></ul>
            </div>

            <div class="trading-workspace" id="mobileTradingWorkspace">
                <div class="workspace-header">
                    <div>
                        <h2 id="activeSymbol" style="margin: 0; font-size: 1.1rem;">AAPL / USD</h2>
                        <span id="activeFullName" style="font-size: 0.75rem; color: var(--text-muted);">Apple Inc.</span>
                    </div>
                    <!-- Bouton pour changer d'actif rapidement sur mobile -->
                    <button class="stock-select-btn" id="mobileListToggleBtn" style="border-color: var(--neon-purple); color: var(--neon-purple);" onclick="openMobileAssetsList()">Liste ☰</button>
                </div>

                <div class="chart-frame">
                    <canvas id="mainChart"></canvas>
                </div>

                <!-- FORMULAIRE INVESTIR MODE DÉMO -->
                <div class="demo-invest-bar">
                    <div class="invest-input-box">
                        <label>Quantité Simulation</label>
                        <input type="number" id="tradeQuantity" value="1" min="0.01" step="any">
                    </div>
                    <div class="btn-group">
                        <button class="action-btn buy" onclick="executeDemoTrade('BUY')">Achat Démo</button>
                        <button class="action-btn sell" onclick="executeDemoTrade('SELL')">Vente Démo</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- WALLET -->
        <div class="wallet-view-pane" id="walletWorkspace">
            <h1 style="font-weight: 300; margin-top: 0; font-size: 1.5rem;">Votre Portefeuille Démo</h1>
            <div class="wallet-grid" id="walletCardsContainer"></div>
        </div>
    </div>

    <!-- MODALE INTERACTIVE AU CLIC SUR UN ACTIF -->
    <div class="modal-overlay" id="choiceModal">
        <div class="choice-modal">
            <h3 id="modalAssetTitle" style="margin: 0 0 10px 0;">Sélection</h3>
            <p id="modalAssetDesc" style="font-size: 0.85rem; color: var(--text-muted); margin: 0 0 20px 0;"></p>
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="handleModalChoice('CHART')">📊 Voir le graphique</button>
                <button class="modal-btn secondary" onclick="handleModalChoice('INVEST')">💰 Investir en mode démo</button>
                <button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const marketDatabase = {
            stock: [
                { symbol: "AAPL", name: "Apple Inc.", price: 178.50, change: 1.2, history: [172, 174, 173, 176, 175, 178.5] },
                { symbol: "NVDA", name: "NVIDIA Corp.", price: 875.20, change: 4.8, history: [820, 835, 850, 844, 861, 875.2] },
                { symbol: "TSLA", name: "Tesla Inc.", price: 171.05, change: -2.3, history: [178, 176, 175, 172, 170, 171.05] },
                { symbol: "MSFT", name: "Microsoft Corp.", price: 421.90, change: 0.5, history: [415, 418, 420, 419, 423, 421.9] }
            ],
            crypto: [
                { symbol: "BTC", name: "Bitcoin", price: 67400, change: 2.1, history: [65000, 65500, 66000, 65800, 67000, 67400] },
                { symbol: "ETH", name: "Ethereum", price: 3540, change: -0.4, history: [3600, 3580, 3590, 3560, 3520, 3540] }
            ],
            meme: [
                { symbol: "DOGE", name: "Dogecoin", price: 0.142, change: 15.4, history: [0.11, 0.12, 0.115, 0.13, 0.135, 0.142] }
            ]
        };

        let demoWallet = { USD: 10000.00 };
        let currentActiveCategory = 'stock';
        let currentSelectedAsset = marketDatabase.stock[0];
        let modalPendingAsset = null;
        let chartInstance = null;

        window.onload = function() {
            initTradingChart();
            generateStockTopRightMenu();
            renderWalletDashboard();
            
            window.onclick = function() {
                document.getElementById('stockDropdown').style.display = 'none';
            };
        };

        function generateStockTopRightMenu() {
            const container = document.getElementById('stockDropdown');
            container.innerHTML = '';
            marketDatabase.stock.forEach(stock => {
                const div = document.createElement('div');
                div.innerText = `${stock.symbol} - ${stock.name}`;
                div.onclick = function(e) {
                    e.stopPropagation();
                    container.style.display = 'none';
                    triggerAssetFlow(stock, 'stock');
                };
                container.appendChild(div);
            });
        }

        function toggleStockDropdown(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('stockDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function toggleMenu(open) {
            document.getElementById('sidebarDrawer').classList.toggle('open', open);
            document.getElementById('menuBackdrop').style.display = open ? 'block' : 'none';
        }

        function openMobileAssetsList() {
            document.getElementById('mobileAssetsSidebar').classList.add('mobile-show');
        }

        function navigateTo(category) {
            toggleMenu(false);
            document.getElementById('welcomeScreen').style.display = 'none';
            
            if (category === 'wallet') {
                document.getElementById('marketWorkspace').style.display = 'none';
                document.getElementById('walletWorkspace').style.display = 'block';
                renderWalletDashboard();
            } else {
                document.getElementById('walletWorkspace').style.display = 'none';
                document.getElementById('marketWorkspace').style.display = 'grid';
                currentActiveCategory = category;
                
                const titles = { stock: "Actions Bourse", crypto: "Crypto-monnaies", meme: "Meme Coins" };
                document.getElementById('sidebarCategoryTitle').innerText = titles[category];
                
                renderSidebarAssetsList();
                // Sur mobile, on affiche directement la liste au changement de catégorie
                if(window.innerWidth <= 768) {
                    openMobileAssetsList();
                } else {
                    loadAssetIntoWorkspace(marketDatabase[category][0]);
                }
            }
        }

        function renderSidebarAssetsList() {
            const container = document.getElementById('assetsContainer');
            container.innerHTML = '';
            marketDatabase[currentActiveCategory].forEach(asset => {
                const li = document.createElement('li');
                li.className = 'asset-row';
                li.onclick = () => triggerAssetFlow(asset, currentActiveCategory);
                li.innerHTML = `
                    <div style="text-align:left;">
                        <strong>${asset.symbol}</strong><br>
                        <span style="font-size:0.75rem; color:var(--text-muted);">${asset.name}</span>
                    </div>
                    <div style="text-align:right; font-family:monospace;">
                        <div>${asset.price.toFixed(2)} $</div>
                        <span class="${asset.change >= 0 ? 'up' : 'down'}">${asset.change >= 0 ? '+' : ''}${asset.change}%</span>
                    </div>
                `;
                container.appendChild(li);
            });
        }

        function triggerAssetFlow(asset, category) {
            currentActiveCategory = category;
            modalPendingAsset = asset;
            
            document.getElementById('modalAssetTitle').innerText = `${asset.symbol} - ${asset.name}`;
            document.getElementById('modalAssetDesc').innerText = `Cotation : ${asset.price.toFixed(2)} $.`;
            document.getElementById('choiceModal').style.display = 'flex';
        }

        function handleModalChoice(choice) {
            closeModal();
            // Masque la liste mobile pour revenir au graphique
            document.getElementById('mobileAssetsSidebar').classList.remove('mobile-show');
            loadAssetIntoWorkspace(modalPendingAsset);

            if (choice === 'INVEST') {
                document.getElementById('tradeQuantity').focus();
                showToast(`Mode Démo activé sur ${modalPendingAsset.symbol}.`);
            } else {
                showToast(`Graphique de ${modalPendingAsset.symbol} mis à jour.`);
            }
        }

        function closeModal() {
            document.getElementById('choiceModal').style.display = 'none';
        }

        function loadAssetIntoWorkspace(asset) {
            currentSelectedAsset = asset;
            document.getElementById('activeSymbol').innerText = `${asset.symbol} / USD`;
            document.getElementById('activeFullName').innerText = asset.name;
            
            chartInstance.data.datasets[0].label = asset.symbol;
            chartInstance.data.datasets[0].data = [...asset.history];
            chartInstance.update();
        }

        function executeDemoTrade(direction) {
            const qty = parseFloat(document.getElementById('tradeQuantity').value);
            if (isNaN(qty) || qty <= 0) {
                showToast("Erreur : Quantité invalide");
                return;
            }

            const cost = qty * currentSelectedAsset.price;

            if (direction === 'BUY') {
                if (demoWallet.USD >= cost) {
                    demoWallet.USD -= cost;
                    demoWallet[currentSelectedAsset.symbol] = (demoWallet[currentSelectedAsset.symbol] || 0) + qty;
                    showToast(`Achat virtuel : +${qty} ${currentSelectedAsset.symbol}`);
                } else {
                    showToast("Fonds insuffisants !");
                }
            } else {
                if (demoWallet[currentSelectedAsset.symbol] && demoWallet[currentSelectedAsset.symbol] >= qty) {
                    demoWallet.USD += cost;
                    demoWallet[currentSelectedAsset.symbol] -= qty;
                    showToast(`Vente virtuelle : -${qty} ${currentSelectedAsset.symbol}`);
                } else {
                    showToast("Pas assez d'actifs à vendre.");
                }
            }
            renderWalletDashboard();
        }

        function renderWalletDashboard() {
            document.getElementById('headerBalance').innerText = `${demoWallet.USD.toLocaleString('fr-FR', {minimumFractionDigits: 2})} $`;
            const container = document.getElementById('walletCardsContainer');
            if(!container) return;
            container.innerHTML = '';

            for (const [symbol, qty] of Object.entries(demoWallet)) {
                if (qty <= 0) continue;
                const card = document.createElement('div');
                card.className = 'wallet-card';
                card.innerHTML = `
                    <div style="text-align:left;"><strong>${symbol}</strong><br><span style="color:var(--text-muted);font-size:0.8rem;">${qty.toFixed(2)} unités</span></div>
                    <div style="font-family:monospace; font-weight:bold; color:var(--neon-green)">${symbol === 'USD' ? qty.toFixed(2) : 'Achat Sim.'} ${symbol === 'USD' ? '$' : ''}</div>
                `;
                container.appendChild(card);
            }
        }

        function initTradingChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ["Lun", "Mar", "Mer", "Jeu", "Ven", "Live"],
                    datasets: [{
                        data: [172, 174, 173, 176, 175, 178.5],
                        borderColor: '#00f3ff',
                        backgroundColor: 'rgba(0, 243, 255, 0.05)',
                        fill: true,
                        tension: 0.15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(31, 36, 77, 0.1)' }, ticks: { color: '#6e759f', font: { size: 10 } } },
                        y: { grid: { color: 'rgba(31, 36, 77, 0.1)' }, ticks: { color: '#6e759f', font: { size: 10 } } }
                    }
                }
            });
        }

        function resetToWelcome() {
            document.getElementById('marketWorkspace').style.display = 'none';
            document.getElementById('walletWorkspace').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'flex';
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
